services:
  - type: web
    name: checkinme-api
    runtime: docker
    plan: free
    healthCheckPath: /health
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: APP_ENV
        value: production
      - key: PORT
        value: 10000
      # Paste your Supabase Postgres connection string in Render Dashboard.
      # Recommended for Render/Supabase: Supavisor Session pooler string on port 5432.
      # If you must use Transaction pooler on port 6543, set DB_QUERY_EXEC_MODE=simple_protocol.
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: DEVICE_WEBHOOK_SECRET
        generateValue: true
      - key: DEFAULT_TIMEZONE
        value: Asia/Phnom_Penh
      - key: AUTO_MIGRATE
        value: true
      - key: CORS_ALLOWED_ORIGINS
        value: "*"
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_DEFAULT_CHAT_ID
        sync: false
      - key: BANK_PROVIDER
        value: manual_csv
      - key: BANK_API_BASE_URL
        sync: false
      - key: BANK_API_KEY
        sync: false
      - key: DB_MAX_CONNS
        value: 8
      - key: DB_MIN_CONNS
        value: 1
      - key: DB_MAX_CONN_IDLE_MINUTES
        value: 5
      - key: DB_QUERY_EXEC_MODE
        value: auto
      - key: REQUEST_TIMEOUT_SECONDS
        value: 15
      - key: SLOW_REQUEST_MS
        value: 700
      - key: CACHE_TTL_SECONDS
        value: 60
      - key: ASYNC_WORKER_LIMIT
        value: 6
      - key: FRAUD_WARN_SCORE
        value: 40
      - key: FRAUD_BLOCK_SCORE
        value: 100
      - key: FRAUD_MAX_SPEED_KPH
        value: 180
      - key: FRAUD_MAX_GPS_ACCURACY_M
        value: 80
      - key: FRAUD_DUPLICATE_SECONDS
        value: 120
